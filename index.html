<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Corretor IFMG - Protótipo</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        <div class="bg-white p-6 rounded-lg shadow-lg">
            <h1 class="text-2xl font-bold text-green-700 mb-6">Configurador de Gabarito - IFMG</h1>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <input type="text" id="titulo" placeholder="Título da Prova" class="border p-2 rounded">
                <input type="text" id="assunto" placeholder="Assunto" class="border p-2 rounded">
                <input type="date" id="data" class="border p-2 rounded">
                <input type="number" id="qtdQuestoes" placeholder="Nº de Questões" class="border p-2 rounded">
            </div>

            <button id="gerarGrade" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700 w-full md:w-auto">
                Gerar Grade de Respostas
            </button>

            <div id="areaGabarito" class="hidden mt-8 border-t pt-8">
                <h2 class="text-xl font-semibold mb-4">Marque as Respostas Corretas</h2>
                <div id="grade" class="space-y-2"></div>
                
                <div class="mt-8 flex gap-4">
                    <button id="salvarProva" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                        Salvar Gabarito
                    </button>
                    <button id="inserirQuestao" class="bg-orange-500 text-white px-6 py-2 rounded hover:bg-orange-600">
                        + Inserir Questão
                    </button>
                    <button id="exportarJSON" class="bg-gray-800 text-white px-6 py-2 rounded hover:bg-black">
                        Exportar JSON
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white p-6 rounded-lg shadow-lg">
            <h2 class="text-xl font-bold text-gray-800 mb-4">Provas Cadastradas</h2>
            <div id="listaProvas" class="space-y-3">
                <p class="text-gray-500 italic">NenhumA prova salva ainda.</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
