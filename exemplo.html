<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Prova - Gabarito</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    h1 {
      text-align: center;
    }
    .cabecalho {
      margin-bottom: 30px;
    }
    .cabecalho label {
      display: inline-block;
      width: 80px;
      font-weight: bold;
    }
    .questao {
      margin-bottom: 15px;
    }
    .alternativas{
        display: flex;
        flex-direction: row;
    }
    span {
      display: flex;
      align-items: center;
      margin-right: 20px;
    }
    .box {
      border: 1px solid #000;
      width: 20px;
      height: 20px;
      display: inline-block;
      margin-right: 5px;
    }
  </style>
</head>
<body>
  <h1>Prova de Matemática</h1>
  
  <div class="cabecalho">
    <p><label>Nome:</label> Lucas Simão</p>
    <p><label>Turma:</label> 1 INFO A</p>
    <p><label>Data:</label> 06/04/2026</p>
  </div>
  
  <div class="questao">
    <p>Questão 1:</p>
    <div class="alternativas">
      <span><div class="box"></div> A</span>
      <span><div class="box"></div> B</span>
      <span><div class="box"></div> C</span>
      <span><div class="box" style="background-color: #000;"></div> D</span>
    </div>
  </div>
  
  <div class="questao">
    <p>Questão 2:</p>
    <div class="alternativas">
      <span><div class="box"></div> A</span>
      <span><div class="box" style="background-color: #000;"></div> B</span>
      <span><div class="box"></div> C</span>
      <span><div class="box"></div> D</span>
    </div>
  </div>
  
  <!-- Repita para mais questões -->
</body>
</html>
